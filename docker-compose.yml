services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wedding}
      POSTGRES_USER: ${POSTGRES_USER:-wedding}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wedding}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://wedding:wedding@postgres:5432/wedding?schema=public}
      ADMIN_ACCESS_CODE: ${ADMIN_ACCESS_CODE:-change-me}
      JWT_SECRET: ${JWT_SECRET:-change-me-too}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:5173}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost:5173}
      SERVER_PORT: 4000
    ports:
      - "4000:4000"
    volumes:
      - upload-data:/app/uploads

  client:
    build:
      context: ./client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  postgres-data:
  upload-data:
