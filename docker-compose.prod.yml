services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ADMIN_ACCESS_CODE: ${ADMIN_ACCESS_CODE}
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_ORIGIN: ${PUBLIC_SITE_URL}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL}
      SERVER_PORT: 4000
    volumes:
      - upload-data:/app/uploads

  seed:
    build:
      context: ./server
    profiles:
      - seed
    depends_on:
      - postgres
    environment:
      DATABASE_URL: ${DATABASE_URL}
    command: sh -c "npx prisma migrate deploy && npx prisma db seed"
    restart: "no"

  client:
    build:
      context: ./client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${APP_BIND:-127.0.0.1:8080}:80"

volumes:
  postgres-data:
  upload-data:
